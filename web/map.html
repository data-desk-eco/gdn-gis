<style>
@import url(https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap);
html,body{margin:0;height:100%;background:#fff;overflow:hidden;font:12px/1.4 'JetBrains Mono',monospace;text-transform:lowercase;color:#444a55}
canvas{display:block;width:100vw;height:100vh;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}

/* hud (top left) + legend (top right) */
#hud,#leg{position:fixed;top:12px;pointer-events:none;text-shadow:0 1px 3px #fff}
#hud{left:14px}
#hud b{font-size:15px;color:#111}
#hud small{opacity:.55}
#leg{right:14px;display:grid;gap:1px;justify-items:end;pointer-events:auto;cursor:pointer;user-select:none}
.key{display:flex;flex-direction:row-reverse;align-items:center;gap:6px;opacity:.95}
.key.off{opacity:.25}
.key i{width:14px;height:3px;border-radius:2px;flex:none}
.key i.dot{width:7px;height:7px;border-radius:50%;border:1px solid #222;margin:0 2.5px}

/* loading message, tooltip, place labels */
#msg{position:fixed;inset:0;display:grid;place-content:center;font-size:15px}
#tp{position:fixed;left:14px;top:36px;pointer-events:none;text-shadow:0 1px 3px #fff}
#tp:empty{display:none}
#tp b{color:#111}
#tp span{color:#444a55}
#pl span{position:fixed;transform:translate(-50%,-50%);pointer-events:none;white-space:nowrap;color:#5a616e;text-shadow:0 0 3px #fff,0 0 3px #fff}

/* timeline (bottom centre): play button + two overlaid range inputs (lo, yr) */
#tl{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:#ffffffd0;border:1px solid #00000022;border-radius:8px;padding:6px 12px;backdrop-filter:blur(4px)}
#tl button{all:unset;cursor:pointer;width:16px;text-align:center;color:#111}
#tl input{width:min(34vw,300px);height:14px;-webkit-appearance:none;background:none;grid-area:1/1;pointer-events:none}
#tl input::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:13px;height:13px;border-radius:50%;background:#4e93d0}
#tl input::-moz-range-thumb{pointer-events:auto;width:13px;height:13px;border:0;border-radius:50%;background:#4e93d0}
#rg{display:grid;align-items:center}
#rg::before{content:'';grid-area:1/1;height:4px;border-radius:2px;background:#00000022}
#tl span{font-variant-numeric:tabular-nums;min-width:34px;text-align:right;color:#111;white-space:nowrap}

.logo{position:fixed;bottom:14px;right:14px;width:50px;height:50px;color:#000;opacity:.5;display:block}
.logo:hover{opacity:.8}
@media(max-width:640px){#tl{left:10px;right:10px;transform:none}#rg{flex:1}#tl input{width:100%}.logo{display:none}}
</style>
